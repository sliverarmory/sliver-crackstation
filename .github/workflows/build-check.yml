name: Build Check
on:
  push:
    branches: main
    paths:
      - "**.go"
      - "**.mod"
      - "**.sum"
      - "**.yml"
      - "Makefile"
      - "go-assets.sh"

  pull_request:
    branches: main
    paths:
      - "**.go"
      - "**.mod"
      - "**.sum"
      - "**.yml"
      - "Makefile"
      - "go-assets.sh"

jobs:
  build-linux-windows:
    name: Build Linux & Windows
    runs-on: "ubuntu-latest"

    steps:
      - name: Go 1.25
        uses: actions/setup-go@v6
        with:
          go-version: ^1.25

      - name: Check Out Code
        uses: actions/checkout@v6

      - name: Git Fetch Tags
        run: git fetch --prune --unshallow --tags -f

      - name: Make
        working-directory: .
        run: |
          make linux
          make windows

  build-macos:
    name: Build MacOS
    runs-on: "macos-latest"

    steps:
      - name: Go 1.25
        uses: actions/setup-go@v6
        with:
          go-version: ^1.25

      - name: Check Out Code
        uses: actions/checkout@v6

      - name: Git Fetch Tags
        run: git fetch --prune --unshallow --tags -f

      - name: Make
        working-directory: .
        run: |
          make macos-amd64
          make macos-arm64
